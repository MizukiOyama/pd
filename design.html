<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モーダルでログイン</title>
  <style>
    /* 上記で指定したモーダルのスタイルをコピー */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }
    .modal-content {
      background-color: #fff;
      margin: 15% auto;
      padding: 20px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }
    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>design</h1>
  <p>このページではモーダルを使ってログインを促します。</p>

  <!-- ログインモーダル -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>ログインが必要です</h2>
      <p>サイトを閲覧するためにログインしてください。</p>
      <button onclick="goToLoginPage()">ログインページへ</button>
    </div>
  </div>

  <script>
    // 仮のログインチェック関数
    function checkLoginStatus() {
      // ローカルストレージやCookieを使ってログイン状態を確認
      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

      // 未ログインならモーダルを表示
      if (!isLoggedIn) {
        document.getElementById('loginModal').style.display = 'block';
      }
    }

    // モーダルを閉じる関数
    function closeModal() {
      document.getElementById('loginModal').style.display = 'none';
    }

    // ログインページに遷移する関数
    function goToLoginPage() {
      window.location.href = 'https://script.google.com/macros/s/AKfycby69J2onbfcAKRozvXnTn_nqua2mIYz-noHwE76KiiTTKGb4KbnylYA2f65bUjnk0Op/exec'; // ログインページに遷移
    }

    // ページ読み込み時にログイン状態を確認
    window.onload = checkLoginStatus;

    const redirectUrl = window.location.href; // 現在のページのURL
    window.location.href = `https://mizukioyama.github.io/pd/design.html?redirect=${encodeURIComponent(redirectUrl)}`;

  </script>
</body>
</html>

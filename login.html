<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Precision Design</title>
  <link rel="icon" href="https://mizukioyama.github.io/pd/hp-img/pd-logo.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- CSSファイルの読み込み -->

  <!-- jQueryの読み込み -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- JavaScriptファイルの読み込み -->

  <!--Search-->
  <meta name="description" content="想いを形に、こだわりをデザインする。">
  <meta name="keywords" content="Precision Design, こだわり, デザイン, 想い, 伝える">
  <!--cash-->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!--Referrer-Policy-->
  <meta name="referrer" content="strict-origin">
  <!--HSTS-->
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000">
  <!--CSP-->

  <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .form-container {
        width: 300px;
        margin: 0 auto;
      }
      .input-field {
        margin: 10px 0;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>会員登録</h2>
      <div id="errorMessage" class="error"></div>
      <div class="input-field">
        <label>氏名:</label>
        <input type="text" id="name" required>
      </div>
      <div class="input-field">
        <label>メールアドレス:</label>
        <input type="email" id="email" required>
      </div>
      <div class="input-field">
        <label>パスワード:</label>
        <input type="password" id="password" required>
      </div>
      <div class="input-field">
        <label>パスワード（再入力）:</label>
        <input type="password" id="confirmPassword" required>
      </div>
      <button onclick="register()">登録</button>
    </div>

    <script>
      function register() {
        var name = document.getElementById('name').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirmPassword').value;

        // パスワードの一致確認
        google.script.run.withSuccessHandler(function(passwordCheckResult) {
          if (passwordCheckResult.status === 'error') {
            document.getElementById('errorMessage').textContent = passwordCheckResult.message;
            return;
          }

          // ユーザー登録処理
          google.script.run.withSuccessHandler(function(result) {
            document.getElementById('errorMessage').textContent = result.message;
            if (result.status === 'success') {
              // フィールドをクリアする
              document.getElementById('name').value = '';
              document.getElementById('email').value = '';
              document.getElementById('password').value = '';
              document.getElementById('confirmPassword').value = '';
            }
          }).registerUser(name, email, password);

        }).checkPassword(password, confirmPassword);
      }
    </script>
  </body>
</html>
